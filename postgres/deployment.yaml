apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql-deployment
  namespace: psql
  labels:
    app: postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      volumes:
        - name: "psql"
          persistentVolumeClaim:
            claimName: psql
      containers:
        - name: psql
          image: postgres:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "admin"
            - name: POSTGRES_PASSWORD
              value: "admin"
            - name: POSTGRES_DB
              value: "check"
          volumeMounts:
            - name: psql
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "200Mi"
              cpu: "200m"